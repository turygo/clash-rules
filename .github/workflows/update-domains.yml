name: update-sports-live-domains

on:
  schedule:
    - cron: '0 18 * * *'      # 每天 02:00 (UTC+8) 跑一次
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 解析并合并域名
        run: node update-list.js

      - name: 有变化则提交
        run: |
          if [[ -n "$(git status --porcelain sports-live.list)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sports-live.list
            git commit -m "chore: auto-update sports-live domains ($(date -u +%F))"
            git push
          else
            echo "无新增域名，跳过提交"
          fi
